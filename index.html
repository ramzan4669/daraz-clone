<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Shopping in Pakistan: Fashion, Electronics & Groceries</title>
    <link
      rel="icon"
      href="https://laz-img-cdn.alicdn.com/imgextra/i1/O1CN01V8uEDV1jdZ9U2wL90_!!6000000004571-73-tps-64-64.ico"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&family=Noto+Sans+Arabic&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/vendor/bootstrap.css" />
    <link rel="stylesheet" href="assets/css/header.css?v=8" />
    <link rel="stylesheet" href="assets/css/footer.css" />
    <link rel="stylesheet" href="assets/css/home.css" />
    <link rel="stylesheet" href="assets/css/category-grid.css" />
    <link rel="stylesheet" href="assets/css/lift-navigation.css" />
    <link rel="stylesheet" href="assets/css/messages-button.css" />
    <link rel="stylesheet" href="assets/css/auth-modal.css?v=8" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <script src="assets/js/partials/header.js"></script>
    <script src="assets/js/partials/home-categories.js"></script>
    <script type="module" src="assets/js/home.js" defer></script>
    <script type="module" src="assets/js/sticky-header.js" defer></script>
    <script type="module" src="assets/js/partials/inject.js" defer></script>
    <script type="module" src="assets/js/auth-modal.js" defer></script>
  </head>
  <body class="has-main-scroll home-page">
    <div id="main-scroll">
      <header class="bg-primary head sticky-top">
        <script>if (typeof getHeaderTopHtml === "function") document.write(getHeaderTopHtml(false));</script>
        <!--gap container-->
        <div class="gap-div"></div>
      </header>

      <main class="overflow-y-scroll">
        <section class="hero-section">
          <div class="container-main d-flex">
            <div class="hero-slider-wrap flex-grow-1">
              <div class="swiper hero-swiper">
                <div class="swiper-wrapper"></div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-pagination"></div>
              </div>
            </div>
            <div class="hero-sidebar">
              <div class="pc-download-module">
                <div class="flex flex-row flex-items-center">
                  <div class="common-img logo">
                    <img
                      src="https://img.lazcdn.com/us/domino/1ee015d6a5c62fd0339c88c657c1c183.jpg_120x120q80.jpg"
                      alt="Daraz"
                    />
                  </div>
                  <span class="title two-line-clamp"> TRY DARAZ APP </span>
                </div>
                <div class="module-content">
                  <div class="score flex flex-row flex-items-center">
                    <div class="common-img star">
                      <img
                        src="https://img.lazcdn.com/g/tps/imgextra/i4/O1CN01cAMOjU1zqQJZU8EbT_!!6000000006765-2-tps-19-18.png_80x80q80.png"
                        alt="Star"
                      />
                    </div>
                    <span class="rated-txt">4.8 Rated</span>
                  </div>
                  <div class="enjoy-tips-wrap flex flex-justify-center">
                    <span class="enjoy-tips two-line-clamp"
                      >Download the App now</span
                    >
                  </div>
                  <div class="free-voucher-icons">
                    <div class="icon-item flex flex-row flex-items-center">
                      <div class="common-img badge">
                        <img
                          src="https://img.lazcdn.com/g/tps/imgextra/i2/O1CN01n3PMa828kJZVuCbPp_!!6000000007970-2-tps-72-72.png_150x150q80.png"
                          alt="Free Shipping"
                        />
                      </div>
                      <span class="txt two-line-clamp"> Free Shipping </span>
                    </div>
                    <div class="icon-item flex flex-row flex-items-center">
                      <div class="common-img badge">
                        <img
                          src="https://img.lazcdn.com/g/tps/imgextra/i3/O1CN01J03SMW1lebTE7xkaN_!!6000000004844-2-tps-72-72.png_150x150q80.png"
                          alt="Vouchers"
                        />
                      </div>
                      <span class="txt two-line-clamp">
                        Exclusive Vouchers
                      </span>
                    </div>
                  </div>
                </div>
                <div class="module-qr">
                  <div class="content flex flex-row flex-items-center">
                    <div class="common-img qr-code-image">
                      <img
                        src="https://img.drz.lazcdn.com/g/tps/imgextra/i2/O1CN01jHjmpl1pxcRVgFrYS_!!6000000005427-0-tps-150-150.jpg_360x360q80.jpg"
                        alt="QR Code"
                      />
                    </div>
                    <div
                      class="download-btn flex flex-col flex-justify-between"
                    >
                      <a href="/" class="btn btn-1"></a>
                      <a href="/" class="btn btn-2"></a>
                    </div>
                  </div>
                  <span class="download-tips two-line-clamp">
                    Download the App Now!</span
                  >
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="sale-banner-section">
          <div class="container-main">
            <a href="/">
              <img
                src="https://img.lazcdn.com/us/domino/ac9dc866-3c9c-4e52-a789-681835ae7ebb_PK-1188-140.gif"
                alt="Summer Sale"
                class="w-100 sale-banner-img"
              />
            </a>
          </div>
        </section>

        <section class="flash-sale-section" id="js_flashSale">
          <div class="container-main">
            <div class="section-header">
              <h2 class="section-title">Flash Sale</h2>
            </div>
            <div class="card-flash-content bg-white"></div>
          </div>
        </section>

        <section class="category-grid-container" id="js_categories">
          <div class="home-card container-main">
            <div class="home-card-header">
              <h2 class="home-card-title">Categories</h2>
            </div>
            <script>if (typeof getCategoryListHtml === "function") document.write(getCategoryListHtml());</script>
          </div>
        </section>

        <section class="jfy-section" id="js_jfy">
          <div class="container-main">
            <div class="section-header">
              <h2 class="section-title">Just For You</h2>
            </div>
            <div class="home-card-content">
              <div class="card-rec-wrapper"></div>
            </div>
            <div class="jfy-card-load-more">
              <div class="load-more-button">Load More</div>
            </div>
          </div>
        </section>
      </main>

      <div id="footer-mount"></div>
    </div>

    <div id="auth-modal-mount"></div>

    <div id="messages-button-mount"></div>

    <div class="lift-nav-container" id="lift-nav">
      <div class="scroll-to-top-box">
        <div class="lift-nav-text">
          <i class="app-icon">&#xe735;</i>
        </div>
      </div>
      <div class="lift-nav-box">
        <div class="lift-nav-text">
          <i class="app-icon app-ic-Flashsale" icon-id="hp-flash-sale"
            >&#xe708;</i
          >
          <div class="hovered-text">Flash Sale</div>
        </div>
      </div>
      <div class="lift-nav-box">
        <div class="lift-nav-text">
          <i class="app-icon app-ic-Categories" icon-id="hp-categories"
            >&#xe6fd;</i
          >
          <div class="hovered-text">Categories</div>
        </div>
      </div>
      <div class="lift-nav-box">
        <div class="lift-nav-text">
          <i class="app-icon app-ic-JustforYou active" icon-id="hp-just-for-you"
            >&#xe61a;</i
          >
          <div class="hovered-text">Just For You</div>
        </div>
      </div>
    </div>
  </body>
</html>
